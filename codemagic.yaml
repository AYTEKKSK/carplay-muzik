workflows:
  ios-build:
    name: Build iOS IPA
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
