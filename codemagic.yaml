workflows:
  ios-carplay-build:
    name: CarPlay iOS Unsigned Build

    environment:
      xcode: latest
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          cd ios-app
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Add iOS platform
        script: |
          cd ios-app
          npx cap add ios || true

      - name: Sync project
        script: |
          cd ios-app
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios-app/ios/App
          pod install || true

      - name: Build unsigned IPA
        script: |
          cd ios-app/ios/App
          if [ -d "App.xcworkspace" ]; then
            xcode-project build-ipa \
              --workspace "App.xcworkspace" \
              --scheme "App"
          else
            xcode-project build-ipa \
              --project "App.xcodeproj" \
              --scheme "App"
          fi

    artifacts:
      - ios-app/build/ios/ipa/*.ipa
