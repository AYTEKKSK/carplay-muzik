workflows:
  ios-carplay-build:
    name: CarPlay iOS Build + TestFlight
    max_build_duration: 60

    environment:
      xcode: latest
      node: 18
      groups:
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          cd ios-app
          npm install

      - name: Sync Capacitor
        script: |
          cd ios-app
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios-app/ios/App
          pod install

      - name: Set build number
        script: |
          cd ios-app/ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios-app/ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
