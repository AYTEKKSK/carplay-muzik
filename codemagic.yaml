workflows:
  ios-carplay-build:
    name: CarPlay iOS Unsigned Build

    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          cd ios-app
          npm install

      - name: Add iOS platform
        script: |
          cd ios-app
          npx cap add ios || true

      - name: Sync project
        script: |
          cd ios-app
          npx cap sync

      - name: Install CocoaPods
        script: |
          cd ios-app/ios/App
          pod install

      - name: Build unsigned IPA
        script: |
          cd ios-app
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - ios-app/build/ios/ipa/*.ipa
