workflows:
  ios-carplay-build:
    name: CarPlay iOS Unsigned Build

    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Add iOS platform
        script: |
          npx cap add ios || true

      - name: Sync project
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build unsigned IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
